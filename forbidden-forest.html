<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Forbidden Forest">
<meta name="theme-color" content="#02080a">
<title>Forbidden Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
  html, body { min-height: 100%; }
  body {
    font-family: 'Cinzel', Georgia, serif;
    background:
      radial-gradient(ellipse at 50% 0%, #1a3818 0%, #08180a 55%, #02080a 100%);
    color: #d8e8c8;
    margin: 0;
    padding:
      max(10px, env(safe-area-inset-top))
      max(14px, env(safe-area-inset-right))
      max(14px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
    min-height: 100vh;
    min-height: 100dvh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-x: hidden;
  }

  .logo {
    display: block;
    margin: 0 auto;
    max-width: 540px;
    width: 100%;
    max-height: 92px;
    filter: drop-shadow(0 4px 10px rgba(40,120,40,0.3));
  }

  .status {
    text-align: center;
    font-size: 13px;
    letter-spacing: 2px;
    color: #b8d8a0;
    min-height: 18px;
  }
  .status .accent { color: #ffd680; font-weight: 600; }
  .status .p1 { color: #ffc880; }
  .status .p2 { color: #8ec4ff; }

  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  .backpack {
    background: linear-gradient(180deg, rgba(40,30,18,0.85), rgba(15,10,6,0.95));
    border: 1.5px solid #6a4a28;
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .backpack.p1 { border-color: #a08038; }
  .backpack.p2 { border-color: #406a9a; }
  .backpack.active.p1 { box-shadow: 0 0 14px rgba(255,210,120,0.5); border-color: #ffd680; }
  .backpack.active.p2 { box-shadow: 0 0 14px rgba(130,190,255,0.5); border-color: #9ec4ff; }
  .backpack.dead { opacity: 0.45; filter: grayscale(0.6); }
  .backpack h3 {
    margin: 0 0 2px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-align: center;
  }
  .backpack.p1 h3 { color: #ffd680; }
  .backpack.p2 h3 { color: #a0c8ff; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .stat-row .lbl { color: #a09080; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
  .stat-row .val { color: #f0e0a8; font-weight: 600; font-size: 13px; }
  .hearts { color: #ff8090; letter-spacing: 2px; }
  .shield-good { color: #a0e8ff; }
  .shield-pinned { color: #ffa060; }
  .shield-pinned::after { content: ' ⚠'; }

  .log {
    flex: 1;
    overflow-y: auto;
    background: rgba(10,6,2,0.5);
    border: 1px solid #3a2a14;
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.35;
    min-height: 60px;
  }
  .log .entry { margin: 2px 0; color: #c8d8a8; }
  .log .entry.bad  { color: #ff9aa8; }
  .log .entry.good { color: #a0ffa8; }
  .log .entry.big  { color: #ffd680; font-weight: 700; }
  .log .entry.bomb { color: #ffc080; }

  .board {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 2px;
    width: 100%;
    max-width: 740px;
    aspect-ratio: 12 / 8;
    background: #0a1808;
    padding: 2px;
    border: 1.5px solid #3a5a28;
    border-radius: 4px;
    position: relative;
  }
  .cell {
    position: relative;
    background:
      radial-gradient(circle at 30% 30%, rgba(120,160,80,0.14), transparent 60%),
      linear-gradient(135deg, #2a4a24, #1a3a18);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: filter 0.1s, box-shadow 0.1s;
    user-select: none;
    overflow: visible;
  }
  .cell:hover { filter: brightness(1.18); }
  .cell.tree {
    background: linear-gradient(135deg, #18301a, #08180a);
  }
  .cell.tree::before {
    content: '🌲';
    position: absolute;
    font-size: clamp(18px, 3.2vw, 30px);
    opacity: 0.95;
    text-shadow: 0 1px 2px #000;
  }
  .cell.blue {
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 5px),
      linear-gradient(135deg, #2c5a9a, #0e2a58);
  }
  .cell.blue::after {
    content: '〜';
    position: absolute;
    color: rgba(200,230,255,0.35);
    font-size: 10px;
    top: 1px; left: 2px;
  }
  .cell .creature {
    position: relative;
    z-index: 2;
    font-size: clamp(14px, 2.6vw, 22px);
    text-shadow: 0 1px 2px #000;
  }
  .cell .food-icon {
    position: absolute;
    bottom: 1px;
    right: 2px;
    font-size: clamp(9px, 1.4vw, 14px);
    z-index: 1;
    opacity: 0.95;
    text-shadow: 0 1px 2px #000;
    filter: drop-shadow(0 0 2px rgba(255,220,120,0.5));
  }
  .cell.player1 { box-shadow: inset 0 0 0 2px #ffd680, 0 0 6px rgba(255,200,100,0.35); }
  .cell.player2 { box-shadow: inset 0 0 0 2px #8ec4ff, 0 0 6px rgba(130,190,255,0.35); }
  .cell.player1.active { animation: pulseP1 1.2s ease-in-out infinite; }
  .cell.player2.active { animation: pulseP2 1.2s ease-in-out infinite; }
  @keyframes pulseP1 {
    0%, 100% { box-shadow: inset 0 0 0 2px #ffd680, 0 0 6px rgba(255,200,100,0.35); }
    50%      { box-shadow: inset 0 0 0 3px #fff0a0, 0 0 14px rgba(255,210,80,0.7); }
  }
  @keyframes pulseP2 {
    0%, 100% { box-shadow: inset 0 0 0 2px #8ec4ff, 0 0 6px rgba(130,190,255,0.35); }
    50%      { box-shadow: inset 0 0 0 3px #c0e0ff, 0 0 14px rgba(130,200,255,0.7); }
  }
  .cell.in-tree::before { opacity: 0.55; transform: scale(0.85); }
  .cell.shootable { cursor: crosshair; }
  .cell.shootable::after {
    content: '✛';
    position: absolute;
    color: rgba(255,120,80,0.6);
    font-size: 14px;
    z-index: 3;
  }

  /* moving projectiles */
  .projectile {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 20px;
    transition: left 0.35s linear, top 0.35s linear, opacity 0.2s;
  }
  .projectile.arrow { color: #ffd680; text-shadow: 0 0 6px #ffa040; }
  .projectile.bomb  { color: #fff; text-shadow: 0 0 8px #ff6040; font-size: 22px; }

  @keyframes boom {
    0% { opacity: 1; transform: scale(0.3); }
    50% { opacity: 1; transform: scale(2.4); }
    100% { opacity: 0; transform: scale(2.8); }
  }
  .explosion {
    position: fixed;
    pointer-events: none;
    z-index: 110;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff8a0 0%, #ff8020 50%, rgba(200,0,0,0) 80%);
    animation: boom 0.55s ease-out forwards;
  }

  .actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 3px;
    border: 1px solid #6a8a48;
    background: linear-gradient(180deg, #2a4a20, #142a10);
    color: #e0e8c0;
    cursor: pointer;
    font-weight: 600;
  }
  button:hover:not(:disabled) {
    background: linear-gradient(180deg, #3a6028, #1a3818);
    box-shadow: 0 0 8px rgba(140,200,80,0.4);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.shoot { border-color: #b06038; background: linear-gradient(180deg, #4a2010, #2a1208); color: #ffc8a0; }
  button.shoot.active { background: linear-gradient(180deg, #a04020, #5a1808); box-shadow: 0 0 14px rgba(255,120,60,0.5); color: #fff; }
  button.music.on { border-color: #9a60b8; background: linear-gradient(180deg, #4a2060, #2a1038); color: #e0c8ff; box-shadow: 0 0 10px rgba(160,100,220,0.45); }
  button.ritual { border-color: #60a0b0; background: linear-gradient(180deg, #104048, #061a20); color: #a0e8d8; }
  button.ritual:hover:not(:disabled) { background: linear-gradient(180deg, #186068, #0a2a30); box-shadow: 0 0 14px rgba(100,220,220,0.4); }

  @media (max-width: 720px) {
    body { gap: 4px; }
    .logo { max-height: 62px; }
    .status { font-size: 11px; letter-spacing: 1px; }
    .layout { grid-template-columns: 1fr; gap: 6px; }
    .sidebar { flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .backpack { flex: 1 1 calc(50% - 3px); padding: 5px 7px; min-width: 150px; }
    .backpack h3 { font-size: 11px; margin-bottom: 2px; }
    .stat-row { font-size: 11px; }
    .stat-row .lbl { font-size: 9px; }
    .stat-row .val { font-size: 12px; }
    .log { min-height: 44px; max-height: 80px; font-size: 10px; line-height: 1.25; flex-basis: 100%; }
    .grid { gap: 2px; }
    .cell { font-size: 14px; }
    .actions { gap: 6px; }
    button { font-size: 10px; padding: 10px 10px; letter-spacing: 1px; min-height: 44px; flex: 1 1 auto; }
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(2,8,4,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 400;
  }
  .overlay.on { display: flex; }
  .overlay-box {
    background: linear-gradient(180deg, #1a3818, #08180a);
    border: 2px solid #b0d088;
    border-radius: 8px;
    padding: 28px 38px;
    text-align: center;
    max-width: 420px;
    box-shadow: 0 0 40px rgba(140,200,80,0.4);
  }
  .overlay-box h2 {
    font-family: 'Cinzel Decorative', serif;
    margin: 0 0 12px;
    color: #ffd680;
    letter-spacing: 4px;
  }
  .overlay-box p { margin: 6px 0 16px; color: #d8e8c8; line-height: 1.4; }
</style>
</head>
<body>

<svg class="logo" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg" aria-label="Forbidden Forest">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8f0a0"/>
      <stop offset="40%" stop-color="#5aa838"/>
      <stop offset="100%" stop-color="#1a4a18"/>
    </linearGradient>
    <radialGradient id="moon" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff8d0"/>
      <stop offset="100%" stop-color="#909068" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="leafGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="400" cy="85" rx="290" ry="36" fill="#3a8a2a" opacity="0.2"/>
  <g transform="translate(400, 22)">
    <circle r="13" fill="url(#moon)"/>
    <circle cx="5" cy="-2" r="11" fill="#08180a"/>
  </g>
  <g transform="translate(110, 90)" fill="url(#leafGrad)" stroke="#0a2008" stroke-width="0.6">
    <path d="M 0 -20 Q 10 -10 0 0 Q -10 -10 0 -20 Z"/>
    <path d="M -22 -8 Q -12 -16 -2 -8 Q -12 0 -22 -8 Z" opacity="0.85"/>
    <path d="M 18 -2 Q 28 -10 38 -2 Q 28 6 18 -2 Z" opacity="0.85"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#3a5a18" stroke-width="1.5"/>
  </g>
  <g transform="translate(690, 90) scale(-1, 1)" fill="url(#leafGrad)" stroke="#0a2008" stroke-width="0.6">
    <path d="M 0 -20 Q 10 -10 0 0 Q -10 -10 0 -20 Z"/>
    <path d="M -22 -8 Q -12 -16 -2 -8 Q -12 0 -22 -8 Z" opacity="0.85"/>
    <path d="M 18 -2 Q 28 -10 38 -2 Q 28 6 18 -2 Z" opacity="0.85"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#3a5a18" stroke-width="1.5"/>
  </g>
  <text x="400" y="92" text-anchor="middle"
        font-family="'Cinzel Decorative', serif"
        font-weight="900" font-size="42"
        fill="url(#leafGrad)"
        letter-spacing="5"
        filter="url(#leafGlow)"
        style="paint-order: stroke; stroke: #02080a; stroke-width: 2.5;">FORBIDDEN FOREST</text>
  <text x="400" y="120" text-anchor="middle"
        font-family="'Cinzel', serif"
        font-size="13" fill="#88a868" letter-spacing="6">two walk in · beasts wait · ponds whisper</text>
</svg>

<div class="status" id="statusLine"></div>

<div class="layout">
  <div class="sidebar">
    <div class="backpack p1" id="bp1">
      <h3>PLAYER 1 🏹</h3>
      <div class="stat-row"><span class="lbl">Health</span><span class="val hearts" id="hp1">♥ ♥ ♥ ♥</span></div>
      <div class="stat-row"><span class="lbl">Arrows</span><span class="val" id="ar1">6</span></div>
      <div class="stat-row"><span class="lbl">Shield</span><span class="val shield-good" id="sh1">🛡 ready</span></div>
      <div class="stat-row"><span class="lbl">Food</span><span class="val" id="fd1">🥖 3</span></div>
      <div class="stat-row"><span class="lbl">Tent</span><span class="val" id="tn1">🏕 1</span></div>
    </div>
    <div class="backpack p2" id="bp2">
      <h3>PLAYER 2 🏹</h3>
      <div class="stat-row"><span class="lbl">Health</span><span class="val hearts" id="hp2">♥ ♥ ♥ ♥</span></div>
      <div class="stat-row"><span class="lbl">Arrows</span><span class="val" id="ar2">6</span></div>
      <div class="stat-row"><span class="lbl">Shield</span><span class="val shield-good" id="sh2">🛡 ready</span></div>
      <div class="stat-row"><span class="lbl">Food</span><span class="val" id="fd2">🥖 3</span></div>
      <div class="stat-row"><span class="lbl">Tent</span><span class="val" id="tn2">🏕 1</span></div>
    </div>
    <div class="log" id="log"></div>
  </div>
  <div class="board"><div class="grid" id="grid"></div></div>
</div>

<div class="actions">
  <button id="shoot" class="shoot">Aim Arrow</button>
  <button id="tent">Pitch Tent</button>
  <button id="ritual" class="ritual">Ritual</button>
  <button id="rest">Wait</button>
  <button id="music" class="music">🔇 Music</button>
  <button id="reset">New Forest</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="overTitle">VICTORY</h2>
    <p id="overBody"></p>
    <button id="overClose">Walk Again</button>
  </div>
</div>

<script>
const W = 12, H = 8;
const MAX_HP = 4;
const MAX_ARROWS = 6;
const TREES = 20;

const ROSTER = [
  { name: 'wolf',   icon: '🐺', hp: 2, dmg: 1, slow: false, moveRange: 1 },
  { name: 'wolf',   icon: '🐺', hp: 2, dmg: 1, slow: false, moveRange: 1 },
  { name: 'bear',   icon: '🐻', hp: 3, dmg: 2, slow: true,  moveRange: 1 },
  { name: 'goblin', icon: '👹', hp: 1, dmg: 0, bomber: true, coolMax: 4, moveRange: 1 },
];
const SLIME = { name: 'slime', icon: '🟢', hp: 2, dmg: 1, blueOnly: true, moveRange: 1 };
const FOOD_ICONS = ['🍄', '🫐', '🍎', '🌰'];
const FOREST_FOOD = 6;

let tiles;
let players;
let current;
let animals;
let mode;      // 'walk' | 'shoot'
let turn;
let gameOver;

function newGame() {
  generateMap();
  players = {
    1: { num: 1, label: 'Player 1', x: 0, y: 2, form: 'archer', hp: MAX_HP, arrows: MAX_ARROWS, food: 3, tents: 1, inTent: 0, alive: true },
    2: { num: 2, label: 'Player 2', x: 0, y: 5, form: 'archer', hp: MAX_HP, arrows: MAX_ARROWS, food: 3, tents: 1, inTent: 0, alive: true },
  };
  placeAnimals();
  current = 1;
  mode = 'walk';
  turn = 1;
  gameOver = false;
  document.getElementById('log').innerHTML = '';
  document.getElementById('overlay').classList.remove('on');
  addLog('Two archers step into the forbidden wood.', 'big');
  render();
}

function generateMap() {
  tiles = Array.from({ length: H }, () =>
    Array.from({ length: W }, () => ({ tree: false, blue: false, food: null }))
  );
  // Blue patches (ponds) — random-walk blobs
  const patchCount = 2 + Math.floor(Math.random() * 2);
  for (let p = 0; p < patchCount; p++) {
    let x = 4 + Math.floor(Math.random() * (W - 5));
    let y = Math.floor(Math.random() * H);
    const size = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < size * 2 && i < 14; i++) {
      if (inBounds(x, y)) tiles[y][x].blue = true;
      const [dx, dy] = [[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random() * 4)];
      x += dx; y += dy;
    }
  }
  // Trees — avoid blue and player spawn corridors
  const blocked = new Set(['0,2', '1,2', '0,5', '1,5']);
  let placed = 0, attempts = 0;
  while (placed < TREES && attempts < 500) {
    attempts++;
    const x = Math.floor(Math.random() * W);
    const y = Math.floor(Math.random() * H);
    if (blocked.has(`${x},${y}`)) continue;
    if (tiles[y][x].tree || tiles[y][x].blue) continue;
    tiles[y][x].tree = true;
    placed++;
  }
  // Make sure starts are clear
  for (const [x, y] of [[0,2],[1,2],[0,5],[1,5]]) {
    tiles[y][x].tree = false;
    tiles[y][x].blue = false;
  }
  // Scatter forage
  let fPlaced = 0, fAttempts = 0;
  while (fPlaced < FOREST_FOOD && fAttempts < 400) {
    fAttempts++;
    const x = Math.floor(Math.random() * W);
    const y = Math.floor(Math.random() * H);
    if (tiles[y][x].tree || tiles[y][x].blue || tiles[y][x].food) continue;
    if ((x <= 1) && (y === 2 || y === 5)) continue;
    tiles[y][x].food = FOOD_ICONS[Math.floor(Math.random() * FOOD_ICONS.length)];
    fPlaced++;
  }
}

function placeAnimals() {
  animals = [];
  let id = 0;
  const farEnough = (x, y) =>
    Math.abs(x - players[1].x) + Math.abs(y - players[1].y) >= 5 &&
    Math.abs(x - players[2].x) + Math.abs(y - players[2].y) >= 5;

  // ground-roaming animals (wolves, bear, goblin)
  for (const t of ROSTER) {
    let x, y, tries = 0;
    do {
      x = Math.floor(Math.random() * W);
      y = Math.floor(Math.random() * H);
      tries++;
      if (tries > 250) break;
    } while (
      tiles[y][x].tree || tiles[y][x].blue ||
      !farEnough(x, y) ||
      animals.some(a => a.x === x && a.y === y)
    );
    animals.push({ id: id++, x, y, ...t, cool: t.coolMax || 0 });
  }
  // slimes on blue tiles
  const bluePool = [];
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (tiles[y][x].blue && !animals.some(a => a.x === x && a.y === y))
        bluePool.push({ x, y });
  for (let i = 0; i < 2 && bluePool.length > 0; i++) {
    const idx = Math.floor(Math.random() * bluePool.length);
    const { x, y } = bluePool.splice(idx, 1)[0];
    animals.push({ id: id++, x, y, ...SLIME });
  }
}

function inBounds(x, y) { return x >= 0 && x < W && y >= 0 && y < H; }
function occupied(x, y) { return animals.some(a => a.x === x && a.y === y); }
function playerOn(x, y) {
  for (const p of [1, 2]) if (players[p].alive && players[p].x === x && players[p].y === y) return players[p];
  return null;
}
function playerInTree(p) { return tiles[p.y][p.x].tree; }
function isProtected(p) { return playerInTree(p) || p.food > 0 || p.inTent > 0; }
function formIcon(p) {
  if (p.inTent > 0) return '🏕';
  if (p.form === 'goblin') return '👹';
  if (p.form === 'slime')  return '🟢';
  return '🏹';
}
function canEnter(p, x, y) {
  // Destination rules per form
  if (p.form === 'archer') return true; // archer can walk any tile (tree=climb, blue=wade, grass)
  if (p.form === 'goblin') return !tiles[y][x].tree && !tiles[y][x].blue;
  if (p.form === 'slime')  return tiles[y][x].blue;
  return true;
}
function hurt(p, n, sourceLabel) {
  p.hp -= n;
  addLog(`${sourceLabel} hits ${p.label} (−${n}).`, 'bad');
  if (p.hp <= 0) {
    if (p.form === 'archer') {
      p.form = 'goblin';
      p.hp = 1;
      p.arrows = 0;
      p.food = 0;
      p.tents = 0;
      p.inTent = 0;
      addLog(`${p.label} collapses… and rises as a goblin! (1 HP, bombs only)`, 'big');
    } else {
      p.hp = 0;
      p.alive = false;
      addLog(`${p.label} has fallen.`, 'big');
    }
  }
}
function adjacentSlime(p) {
  return animals.some(a => a.name === 'slime' && Math.abs(a.x - p.x) + Math.abs(a.y - p.y) === 1);
}
function nearestPlayer(a, max = 99) {
  let best = null, bestD = Infinity;
  for (const p of [1, 2]) {
    if (!players[p].alive) continue;
    const d = Math.abs(players[p].x - a.x) + Math.abs(players[p].y - a.y);
    if (d < bestD && d <= max) { bestD = d; best = players[p]; }
  }
  return best;
}

function addLog(msg, cls) {
  const el = document.createElement('div');
  el.className = 'entry' + (cls ? ' ' + cls : '');
  el.textContent = msg;
  const log = document.getElementById('log');
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function handleCellClick(x, y) {
  if (gameOver) return;
  const p = players[current];
  if (!p.alive) return;
  if (mode === 'shoot') { fireArrow(x, y); return; }
  if (mode === 'bomb')  { throwPlayerBomb(x, y); return; }
  if (mode === 'slam')  { doSlimeSlam(x, y); return; }
  const dx = x - p.x, dy = y - p.y;
  if (Math.abs(dx) + Math.abs(dy) !== 1) { addLog(`${p.label}: that tile is too far.`); return; }
  if (!canEnter(p, x, y)) {
    if (p.form === 'goblin') addLog(`${p.label}: goblins don't climb trees or swim.`);
    else if (p.form === 'slime') addLog(`${p.label}: slimes only slide on blue.`);
    return;
  }
  if (animals.some(a => a.x === x && a.y === y)) { addLog(`${p.label}: a beast blocks your path.`, 'bad'); return; }
  if (playerOn(x, y)) { addLog(`${p.label}: your companion is there.`); return; }
  p.x = x; p.y = y;
  if (p.form === 'archer') {
    if (tiles[y][x].tree) addLog(`${p.label} climbs the boughs.`, 'good');
    else if (tiles[y][x].blue) addLog(`${p.label} wades into the blue pond.`);
    else addLog(`${p.label} steps softly.`);
  } else if (p.form === 'goblin') {
    addLog(`${p.label} the goblin slinks across the moss.`);
  } else {
    addLog(`${p.label} the slime oozes along the pond.`);
  }
  // forage (archer only)
  if (p.form === 'archer' && tiles[y][x].food) {
    const icon = tiles[y][x].food;
    tiles[y][x].food = null;
    p.food++;
    addLog(`${p.label} gathers ${icon} (+1 food).`, 'good');
  }
  endPlayerAction();
}

function shootableCells(p) {
  const cells = [];
  if (p.arrows <= 0) return cells;
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    let x = p.x + dx, y = p.y + dy;
    while (inBounds(x, y)) {
      cells.push({ x, y });
      if (tiles[y][x].tree) break;
      if (animals.some(a => a.x === x && a.y === y)) break;
      x += dx; y += dy;
    }
  }
  return cells;
}

function targetableCells(p) {
  if (!p.alive) return [];
  if (p.form === 'archer') return shootableCells(p);
  if (p.form === 'goblin') {
    const cells = [];
    for (let yy = 0; yy < H; yy++) for (let xx = 0; xx < W; xx++) {
      const d = Math.abs(xx - p.x) + Math.abs(yy - p.y);
      if (d >= 1 && d <= 4) cells.push({ x: xx, y: yy });
    }
    return cells;
  }
  if (p.form === 'slime') {
    const cells = [];
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const x = p.x + dx, y = p.y + dy;
      if (!inBounds(x, y)) continue;
      if (animals.some(a => a.x === x && a.y === y)) cells.push({ x, y });
    }
    return cells;
  }
  return [];
}

function attackMode(p) {
  if (p.form === 'archer') return 'shoot';
  if (p.form === 'goblin') return 'bomb';
  if (p.form === 'slime')  return 'slam';
  return 'shoot';
}
function attackLabel(p) {
  if (p.form === 'archer') return 'Aim Arrow';
  if (p.form === 'goblin') return 'Throw Bomb';
  if (p.form === 'slime')  return 'Slime Slam';
  return 'Attack';
}
function canAttack(p) {
  if (!p.alive) return false;
  if (p.form === 'archer') return p.arrows > 0;
  if (p.form === 'goblin') return true;
  if (p.form === 'slime')  return targetableCells(p).length > 0;
  return false;
}

function canRitual(p) {
  if (!p.alive || p.form !== 'archer') return null;
  const other = players[p.num === 1 ? 2 : 1];
  if (!other.alive || other.form !== 'goblin') return null;
  for (const slime of animals.filter(a => a.name === 'slime')) {
    const pAdj = Math.abs(p.x - slime.x) + Math.abs(p.y - slime.y) === 1;
    const gAdj = Math.abs(other.x - slime.x) + Math.abs(other.y - slime.y) === 1;
    if (pAdj && gAdj) return slime;
  }
  return null;
}

function performRitual() {
  if (gameOver) return;
  const p = players[current];
  const slime = canRitual(p);
  if (!slime) { addLog('The ritual fails — stand with a goblin ally beside an enemy slime.'); return; }
  animals = animals.filter(a => a.id !== slime.id);
  p.form = 'slime';
  p.hp = 3;
  p.arrows = 0;
  p.food = 0;
  p.tents = 0;
  p.inTent = 0;
  addLog(`${p.label} melts into the slime — reborn as a friendly ooze! (all gear lost)`, 'big');
  resetMode();
  endPlayerAction();
}

function resolveKill(p, hit) {
  if (hit.name === 'goblin') {
    if (p.form === 'archer') {
      p.arrows += 3;
      addLog(`The goblin's hoard yields 3 new arrows for ${p.label}.`, 'good');
    } else {
      addLog(`The goblin crumples — a pile of hunting weapons, but no one to use them here.`);
    }
  } else if (hit.name === 'slime') {
    addLog('The slime dissolves into the pond. Inedible.');
  } else {
    if (p.form === 'archer') {
      const meat = hit.name === 'bear' ? 2 : 1;
      p.food += meat;
      addLog(`${p.label} butchers the ${hit.name} (+${meat} food).`, 'good');
    } else {
      addLog(`${p.label} leaves the carcass — no stomach for it in this shape.`);
    }
  }
}

function fireArrow(x, y) {
  const p = players[current];
  if (p.form !== 'archer') return;
  if (p.arrows <= 0) { addLog(`${p.label}: quiver empty.`, 'bad'); resetMode(); return; }
  const dx = x - p.x, dy = y - p.y;
  if ((dx !== 0 && dy !== 0) || (dx === 0 && dy === 0)) { addLog('Arrows fly only straight.'); return; }
  const sx = Math.sign(dx), sy = Math.sign(dy);
  let cx = p.x + sx, cy = p.y + sy;
  let hit = null, blocked = null;
  while (inBounds(cx, cy)) {
    if (tiles[cy][cx].tree) { blocked = { x: cx, y: cy }; break; }
    const a = animals.find(a => a.x === cx && a.y === cy);
    if (a) { hit = a; break; }
    cx += sx; cy += sy;
  }
  p.arrows--;
  flyProjectile('arrow', p.x, p.y, cx, cy, sx, sy);
  const retaliator = (hit && hit.name === 'goblin') ? { x: hit.x, y: hit.y } : null;
  if (hit) {
    hit.hp--;
    if (hit.hp <= 0) {
      animals = animals.filter(a => a.id !== hit.id);
      addLog(`${p.label}'s arrow fells the ${hit.name}!`, 'good');
      resolveKill(p, hit);
    } else {
      addLog(`${p.label}'s arrow strikes the ${hit.name}.`);
    }
  } else if (blocked) addLog('Arrow thuds into a tree.');
  else addLog('Arrow vanishes into the green dark.');
  resetMode();
  // Goblins lob a bomb at the shooter even as they die
  if (retaliator) {
    addLog('The goblin hurls a parting bomb!', 'bad');
    throwBomb({ name: 'goblin', x: retaliator.x, y: retaliator.y }, p);
  }
  endPlayerAction();
}

function throwPlayerBomb(x, y) {
  const p = players[current];
  if (p.form !== 'goblin') return;
  const d = Math.abs(x - p.x) + Math.abs(y - p.y);
  if (d < 1 || d > 4) { addLog(`${p.label}: bomb range is 1–4 tiles.`); return; }
  animateBomb(p.x, p.y, x, y, () => {
    const hit = animals.find(a => a.x === x && a.y === y);
    if (hit) {
      hit.hp -= 3;
      if (hit.hp <= 0) {
        animals = animals.filter(a => a.id !== hit.id);
        addLog(`${p.label}'s bomb obliterates the ${hit.name}!`, 'good');
        resolveKill(p, hit);
      } else {
        addLog(`${p.label}'s bomb rocks the ${hit.name} (−3).`);
      }
    } else {
      addLog(`${p.label}'s bomb bursts in the dirt.`);
    }
    checkGameOver();
    render();
  });
  resetMode();
  endPlayerAction();
}

function doSlimeSlam(x, y) {
  const p = players[current];
  if (p.form !== 'slime') return;
  if (Math.abs(x - p.x) + Math.abs(y - p.y) !== 1) { addLog('Slam is only 1 tile away.'); return; }
  const hit = animals.find(a => a.x === x && a.y === y);
  if (!hit) { addLog('Nothing to slam there.'); return; }
  hit.hp -= 1;
  if (hit.hp <= 0) {
    animals = animals.filter(a => a.id !== hit.id);
    addLog(`${p.label} engulfs the ${hit.name}!`, 'good');
    resolveKill(p, hit);
  } else {
    addLog(`${p.label} slaps the ${hit.name} (−1).`);
  }
  resetMode();
  endPlayerAction();
}

function resetMode() {
  mode = 'walk';
  document.getElementById('shoot').classList.remove('active');
}

function rest() {
  if (gameOver) return;
  const p = players[current];
  if (!p.alive) return;
  addLog(`${p.label} holds their breath…`);
  endPlayerAction();
}

function endPlayerAction() {
  runEnemyPhase();
  // Tent duration decrements for everyone each round (time passes)
  for (const n of [1, 2]) {
    if (players[n].alive && players[n].inTent > 0) players[n].inTent--;
  }
  // Food ticks down only for the player who just acted (hunger from effort)
  const p = players[current];
  if (p.alive && p.food > 0) p.food--;
  if (checkGameOver()) return;
  switchPlayer();
  turn++;
  render();
}

function pitchTent() {
  if (gameOver) return;
  const p = players[current];
  if (!p.alive) return;
  if (p.inTent > 0) { addLog(`${p.label}: already sheltered.`); return; }
  if (p.tents <= 0) { addLog(`${p.label}: no tent left.`, 'bad'); return; }
  p.tents--;
  p.inTent = 2;
  addLog(`${p.label} pitches a tent — sheltered 2 turns.`, 'good');
  resetMode();
  endPlayerAction();
}

function switchPlayer() {
  for (let i = 0; i < 2; i++) {
    current = current === 1 ? 2 : 1;
    if (players[current].alive) return;
  }
  // no one alive — handled by checkGameOver
}

function runEnemyPhase() {
  for (const a of [...animals]) {
    if (!animals.includes(a)) continue; // removed mid-phase
    if (a.slow && turn % 2 === 0) continue;
    if (a.bomber) {
      if (a.cool > 0) { a.cool--; moveAnimal(a); continue; }
      const target = nearestPlayerInRange(a, 6);
      if (target) {
        throwBomb(a, target);
        a.cool = a.coolMax;
        continue;
      }
      moveAnimal(a);
      continue;
    }
    moveAnimal(a);
  }
  // adjacent melee attacks
  for (const a of animals) {
    if (a.bomber) continue;
    for (const p of [1, 2]) {
      if (!players[p].alive) continue;
      if (isProtected(players[p])) continue;
      if (Math.abs(a.x - players[p].x) + Math.abs(a.y - players[p].y) === 1) {
        hurt(players[p], a.dmg, `The ${a.name}`);
      }
    }
  }
}

function nearestPlayerInRange(a, range) {
  let best = null, bestD = Infinity;
  for (const p of [1, 2]) {
    if (!players[p].alive) continue;
    if (isProtected(players[p])) continue; // no bombs at tree/food/tent
    const d = Math.abs(players[p].x - a.x) + Math.abs(players[p].y - a.y);
    if (d <= range && d < bestD) { bestD = d; best = players[p]; }
  }
  return best;
}

function moveAnimal(a) {
  const steps = a.moveRange || 1;
  for (let s = 0; s < steps; s++) {
    const target = nearestPlayer(a);
    if (!target) return;
    const dx = target.x - a.x, dy = target.y - a.y;
    if (dx === 0 && dy === 0) return;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    const tries = [];
    if (adx >= ady) {
      if (dx !== 0) tries.push([Math.sign(dx), 0]);
      if (dy !== 0) tries.push([0, Math.sign(dy)]);
      if (dy !== 0) tries.push([0, -Math.sign(dy)]);
      if (dx !== 0) tries.push([-Math.sign(dx), 0]);
    } else {
      if (dy !== 0) tries.push([0, Math.sign(dy)]);
      if (dx !== 0) tries.push([Math.sign(dx), 0]);
      if (dx !== 0) tries.push([-Math.sign(dx), 0]);
      if (dy !== 0) tries.push([0, -Math.sign(dy)]);
    }
    let moved = false;
    for (const [tx, ty] of tries) {
      const nx = a.x + tx, ny = a.y + ty;
      if (!inBounds(nx, ny)) continue;
      if (tiles[ny][nx].tree) continue;
      if (a.blueOnly && !tiles[ny][nx].blue) continue;
      if (!a.blueOnly && tiles[ny][nx].blue && a.name !== 'slime') continue;
      if (playerOn(nx, ny)) continue;
      if (animals.some(o => o !== a && o.x === nx && o.y === ny)) continue;
      a.x = nx; a.y = ny;
      moved = true;
      break;
    }
    if (!moved) return;
  }
}

function throwBomb(a, target) {
  const strong = Math.random() < 0.12;
  const rawDmg = strong ? 2 : 1;
  const pinned = adjacentSlime(target);
  let final, note;
  if (pinned) {
    final = rawDmg;
    note = `${target.label} is pinned by slime — can't defend! Bomb hits for ${final}.`;
  } else if (strong) {
    final = 2;
    note = `A strong bomb cracks through ${target.label}'s shield for ${final}.`;
  } else {
    final = 0;
    note = `${target.label} raises shield — bomb deflected!`;
  }
  animateBomb(a.x, a.y, target.x, target.y, () => {
    addLog(`${a.name === 'goblin' ? 'The goblin hurls a bomb!' : 'A bomb is hurled!'} ${note}`, final > 0 ? 'bad' : 'good');
    if (final > 0) hurt(target, final, 'The bomb');
    render();
  });
}

function checkGameOver() {
  const anyAlive = players[1].alive || players[2].alive;
  if (!anyAlive) {
    gameOver = true;
    finishGame(false);
    return true;
  }
  if (animals.length === 0) {
    gameOver = true;
    finishGame(true);
    return true;
  }
  return false;
}

function finishGame(won) {
  let title, body;
  if (won) {
    const alive = [players[1], players[2]].filter(p => p.alive);
    title = 'THE FOREST IS STILL';
    body = alive.length === 2
      ? 'Both archers survive. The beasts lie silent.'
      : `${alive[0].label} stands alone among the fallen beasts.`;
  } else {
    title = 'YOU HAVE FALLEN';
    body = 'The wood swallows two wanderers. The trees do not weep.';
  }
  document.getElementById('overTitle').textContent = title;
  document.getElementById('overBody').textContent = body;
  document.getElementById('overlay').classList.add('on');
}

function render() {
  // Backpacks
  for (const num of [1, 2]) {
    const p = players[num];
    const bp = document.getElementById('bp' + num);
    bp.classList.toggle('active', !gameOver && current === num);
    bp.classList.toggle('dead', !p.alive);
    document.getElementById('hp' + num).textContent = p.hp > 0 ? '♥ '.repeat(p.hp).trim() : '—';
    document.getElementById('ar' + num).textContent = String(p.arrows);
    const shEl = document.getElementById('sh' + num);
    if (!p.alive) { shEl.textContent = '— fallen —'; shEl.className = 'val shield-pinned'; }
    else if (adjacentSlime(p)) { shEl.textContent = '🛡 pinned'; shEl.className = 'val shield-pinned'; }
    else { shEl.textContent = '🛡 ready'; shEl.className = 'val shield-good'; }

    const fdEl = document.getElementById('fd' + num);
    if (!p.alive) { fdEl.textContent = '—'; fdEl.className = 'val'; }
    else if (p.food > 0) { fdEl.textContent = `🥖 ${p.food} · peaceful`; fdEl.className = 'val shield-good'; }
    else { fdEl.textContent = '🥖 — · hungry'; fdEl.className = 'val shield-pinned'; }

    const tnEl = document.getElementById('tn' + num);
    if (!p.alive) { tnEl.textContent = '—'; tnEl.className = 'val'; }
    else if (p.inTent > 0) { tnEl.textContent = `🏕 sheltered (${p.inTent})`; tnEl.className = 'val shield-good'; }
    else if (p.tents > 0) { tnEl.textContent = `🏕 ${p.tents}`; tnEl.className = 'val'; }
    else { tnEl.textContent = '🏕 —'; tnEl.className = 'val'; }
  }

  // Status line
  const p = players[current];
  const statusEl = document.getElementById('statusLine');
  if (gameOver) statusEl.innerHTML = '<span class="accent">the hunt is done</span>';
  else {
    const who = current === 1 ? '<span class="p1">Player 1</span>' : '<span class="p2">Player 2</span>';
    const act = mode === 'shoot' ? 'aim an arrow in line of sight' : 'walk adjacent · climb a tree';
    statusEl.innerHTML = `<span class="accent">Turn ${turn}</span> · ${who} · ${act}`;
  }

  // Grid
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const curP0 = players[current];
  const aimModes = new Set(['shoot', 'bomb', 'slam']);
  const targets = (!gameOver && aimModes.has(mode)) ? targetableCells(curP0) : [];
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (tiles[y][x].tree) cell.className += ' tree';
      if (tiles[y][x].blue) cell.className += ' blue';
      for (const num of [1, 2]) {
        const pp = players[num];
        if (pp.alive && pp.x === x && pp.y === y) {
          cell.className += ' player' + num;
          if (num === current && !gameOver) cell.className += ' active';
          if (tiles[y][x].tree) cell.className += ' in-tree';
        }
      }
      if (targets.some(t => t.x === x && t.y === y)) cell.className += ' shootable';
      // Forage icon
      if (tiles[y][x].food) {
        const fspan = document.createElement('span');
        fspan.className = 'food-icon';
        fspan.textContent = tiles[y][x].food;
        cell.appendChild(fspan);
      }
      // Content: prefer player icon; else animal icon
      const p1Here = players[1].alive && players[1].x === x && players[1].y === y;
      const p2Here = players[2].alive && players[2].x === x && players[2].y === y;
      if (p1Here || p2Here) {
        const here = p1Here ? players[1] : players[2];
        const span = document.createElement('span');
        span.className = 'creature';
        span.textContent = formIcon(here);
        cell.appendChild(span);
      } else {
        const a = animals.find(a => a.x === x && a.y === y);
        if (a) {
          const span = document.createElement('span');
          span.className = 'creature';
          span.textContent = a.icon;
          cell.appendChild(span);
        }
      }
      cell.dataset.x = x; cell.dataset.y = y;
      cell.addEventListener('click', () => handleCellClick(x, y));
      grid.appendChild(cell);
    }
  }

  // Buttons
  const curP = players[current];
  const shootBtn = document.getElementById('shoot');
  shootBtn.textContent = attackLabel(curP);
  shootBtn.classList.toggle('active', aimModes.has(mode));
  shootBtn.disabled = gameOver || !canAttack(curP);
  document.getElementById('rest').disabled = gameOver || !curP.alive;
  document.getElementById('tent').disabled = gameOver || !curP.alive || curP.form !== 'archer' || curP.tents <= 0 || curP.inTent > 0;
  document.getElementById('ritual').disabled = gameOver || !canRitual(curP);
}

function cellCenter(x, y) {
  const grid = document.getElementById('grid');
  const el = grid.children[y * W + x];
  if (!el) return null;
  const r = el.getBoundingClientRect();
  return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
}

function flyProjectile(kind, fx, fy, tx, ty, sx, sy) {
  const from = cellCenter(fx, fy);
  const toInBounds = inBounds(tx, ty) ? { x: tx, y: ty } : { x: fx + sx, y: fy + sy };
  const to = cellCenter(toInBounds.x, toInBounds.y);
  if (!from || !to) return;
  const el = document.createElement('div');
  el.className = 'projectile ' + kind;
  el.textContent = kind === 'arrow'
    ? (sx > 0 ? '➤' : sx < 0 ? '⮜' : sy > 0 ? '⮟' : '⮝')
    : '💣';
  el.style.left = from.cx + 'px'; el.style.top = from.cy + 'px';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.left = to.cx + 'px'; el.style.top = to.cy + 'px';
  });
  setTimeout(() => el.remove(), 450);
}

function animateBomb(fx, fy, tx, ty, done) {
  const from = cellCenter(fx, fy);
  const to = cellCenter(tx, ty);
  if (!from || !to) { done(); return; }
  const el = document.createElement('div');
  el.className = 'projectile bomb';
  el.textContent = '💣';
  el.style.left = from.cx + 'px'; el.style.top = from.cy + 'px';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.left = to.cx + 'px'; el.style.top = to.cy + 'px';
  });
  setTimeout(() => {
    el.remove();
    const boom = document.createElement('div');
    boom.className = 'explosion';
    boom.style.left = (to.cx - 14) + 'px';
    boom.style.top = (to.cy - 14) + 'px';
    document.body.appendChild(boom);
    setTimeout(() => boom.remove(), 600);
    done();
  }, 400);
}

document.getElementById('shoot').addEventListener('click', () => {
  if (gameOver) return;
  const p = players[current];
  if (!canAttack(p)) return;
  const am = attackMode(p);
  mode = (mode === am) ? 'walk' : am;
  render();
});
document.getElementById('rest').addEventListener('click', rest);
document.getElementById('tent').addEventListener('click', pitchTent);
document.getElementById('ritual').addEventListener('click', performRitual);
document.getElementById('reset').addEventListener('click', newGame);
document.getElementById('overClose').addEventListener('click', newGame);

window.addEventListener('keydown', e => {
  if (gameOver) return;
  const p = players[current];
  if (!p.alive) return;
  const map = { ArrowLeft:[-1,0], ArrowRight:[1,0], ArrowUp:[0,-1], ArrowDown:[0,1],
                a:[-1,0], d:[1,0], w:[0,-1], s:[0,1] };
  const k = map[e.key];
  if (k) { e.preventDefault(); handleCellClick(p.x + k[0], p.y + k[1]); }
  else if (e.key === 'f' || e.key === 'F') {
    if (canAttack(p)) { const am = attackMode(p); mode = (mode === am) ? 'walk' : am; render(); }
  }
  else if (e.key === '.') rest();
});

// ----- Scary music (Web Audio, procedural) -----
let musicCtx = null;
let musicMaster = null;
let musicTimers = [];

function startMusic() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return false;
  musicCtx = new Ctx();
  musicMaster = musicCtx.createGain();
  musicMaster.gain.value = 0.0;
  musicMaster.connect(musicCtx.destination);
  musicMaster.gain.linearRampToValueAtTime(0.18, musicCtx.currentTime + 2.5);

  // Low bass drone (A1) with slow detuning LFO
  const bass = musicCtx.createOscillator();
  bass.type = 'sawtooth';
  bass.frequency.value = 55;
  const bassFilter = musicCtx.createBiquadFilter();
  bassFilter.type = 'lowpass';
  bassFilter.frequency.value = 140;
  const bassGain = musicCtx.createGain();
  bassGain.gain.value = 0.35;
  bass.connect(bassFilter); bassFilter.connect(bassGain); bassGain.connect(musicMaster);
  const bassLFO = musicCtx.createOscillator();
  bassLFO.frequency.value = 0.07;
  const bassLFOGain = musicCtx.createGain();
  bassLFOGain.gain.value = 1.4;
  bassLFO.connect(bassLFOGain); bassLFOGain.connect(bass.frequency);
  bass.start(); bassLFO.start();

  // Eerie minor pad — A2, C3, E3 (A minor) + F3 (flat-six dissonance)
  const padFreqs = [110.00, 130.81, 164.81, 174.61];
  padFreqs.forEach((f, i) => {
    const osc = musicCtx.createOscillator();
    osc.type = i === 3 ? 'triangle' : 'sine';
    osc.frequency.value = f;
    const filt = musicCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 700;
    const g = musicCtx.createGain();
    g.gain.value = 0.025;
    // slow amplitude wobble per voice
    const lfo = musicCtx.createOscillator();
    lfo.frequency.value = 0.045 + Math.random() * 0.09;
    const lfoG = musicCtx.createGain();
    lfoG.gain.value = 0.02;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    osc.connect(filt); filt.connect(g); g.connect(musicMaster);
    osc.start(); lfo.start();
  });

  // Occasional dissonant shrieks
  scheduleShriek();
  // Occasional low wolf howls
  scheduleHowl();
  return true;
}

function scheduleShriek() {
  const t = setTimeout(() => {
    if (musicCtx && musicCtx.state === 'running') playShriek();
    scheduleShriek();
  }, 5000 + Math.random() * 11000);
  musicTimers.push(t);
}

function playShriek() {
  const now = musicCtx.currentTime;
  const osc = musicCtx.createOscillator();
  osc.type = 'triangle';
  const start = 900 + Math.random() * 500;
  osc.frequency.setValueAtTime(start, now);
  osc.frequency.exponentialRampToValueAtTime(start * 0.28, now + 1.6);
  const g = musicCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.05, now + 0.3);
  g.gain.exponentialRampToValueAtTime(0.0005, now + 1.6);
  const filt = musicCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 1100;
  filt.Q.value = 3;
  osc.connect(filt); filt.connect(g); g.connect(musicMaster);
  osc.start(now); osc.stop(now + 1.7);
}

function scheduleHowl() {
  const t = setTimeout(() => {
    if (musicCtx && musicCtx.state === 'running') playHowl();
    scheduleHowl();
  }, 9000 + Math.random() * 13000);
  musicTimers.push(t);
}

function playHowl() {
  const now = musicCtx.currentTime;
  const osc = musicCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(140, now);
  osc.frequency.exponentialRampToValueAtTime(260, now + 0.4);
  osc.frequency.exponentialRampToValueAtTime(180, now + 2.2);
  const g = musicCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.08, now + 0.5);
  g.gain.setValueAtTime(0.08, now + 1.6);
  g.gain.exponentialRampToValueAtTime(0.0005, now + 2.4);
  const filt = musicCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 350;
  filt.Q.value = 2;
  osc.connect(filt); filt.connect(g); g.connect(musicMaster);
  osc.start(now); osc.stop(now + 2.5);
}

function toggleMusic() {
  const btn = document.getElementById('music');
  if (!musicCtx) {
    if (!startMusic()) return;
    btn.textContent = '🔊 Music';
    btn.classList.add('on');
    return;
  }
  if (musicCtx.state === 'running') {
    musicCtx.suspend();
    btn.textContent = '🔇 Music';
    btn.classList.remove('on');
  } else {
    musicCtx.resume();
    btn.textContent = '🔊 Music';
    btn.classList.add('on');
  }
}
document.getElementById('music').addEventListener('click', toggleMusic);

newGame();
