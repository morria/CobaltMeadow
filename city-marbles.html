<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="City Marbles">
<meta name="theme-color" content="#060418">
<title>City Marbles · 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Russo+One&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #030318; color: #fff; font-family: 'Rajdhani', sans-serif; }
  #game { position: fixed; inset: 0; touch-action: none; }
  canvas { display: block; width: 100%; height: 100%; }
  .hud {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    left: max(12px, env(safe-area-inset-left));
    font-family: 'Russo One', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    z-index: 10;
    min-width: 170px;
  }
  .hud .row {
    background: rgba(10,6,30,0.65);
    border: 1px solid #5040a0;
    padding: 6px 12px;
    margin-bottom: 6px;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  .hud .row .v { color: #ffd060; }
  .hud .combo { border-color: #805040; }
  .hud .combo.hot {
    animation: comboPulse 0.3s ease-out;
    border-color: #ffd060;
    box-shadow: 0 0 14px rgba(255,200,80,0.7);
  }
  @keyframes comboPulse {
    0% { transform: scale(1.0); }
    55% { transform: scale(1.12); }
    100% { transform: scale(1.0); }
  }
  .title {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right));
    font-family: 'Bungee', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: #ff80c0;
    background: rgba(10,6,30,0.65);
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid #5040a0;
    z-index: 10;
    text-shadow: 0 0 8px rgba(255,120,200,0.6);
  }
  .toast {
    position: fixed;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-family: 'Bungee', sans-serif;
    font-size: clamp(22px, 5vw, 38px);
    color: #ffd060;
    text-shadow: 0 2px 0 #602010, 0 0 22px rgba(255,200,80,0.9);
    letter-spacing: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.2s cubic-bezier(.2,1.6,.5,1);
    z-index: 20;
    white-space: nowrap;
    text-align: center;
  }
  .toast.on {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.0);
  }
  .hint {
    position: fixed;
    bottom: max(74px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    color: #c0a0ff;
    background: rgba(10,6,30,0.65);
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid #5040a0;
    z-index: 10;
    text-transform: uppercase;
    text-align: center;
    max-width: 92vw;
  }
  .controls {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 10px;
  }
  button {
    font-family: 'Russo One', sans-serif;
    padding: 10px 18px;
    border: 1.5px solid #c080ff;
    background: linear-gradient(180deg, #3a1a68, #1a0838);
    color: #fff;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 2px;
    font-size: 13px;
    min-height: 44px;
    text-transform: uppercase;
  }
  button:hover:not(:disabled) { background: linear-gradient(180deg, #5028a0, #241050); box-shadow: 0 0 12px rgba(180,120,255,0.5); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.primary { border-color: #ffd060; background: linear-gradient(180deg, #a06020, #5a3010); color: #fff; }
  button.primary:hover:not(:disabled) { background: linear-gradient(180deg, #c88028, #6e4018); }

  #game.shake { animation: screenShake 0.5s ease-out; }
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    15% { transform: translate(-9px, 5px); }
    30% { transform: translate(8px, -6px); }
    45% { transform: translate(-7px, -7px); }
    60% { transform: translate(6px, 6px); }
    80% { transform: translate(-4px, 3px); }
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(4,2,18,0.9);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .overlay.on { display: flex; }
  .overlay-box {
    background: linear-gradient(180deg, #201040, #08041a);
    border: 2px solid #c080ff;
    padding: 28px 36px;
    border-radius: 8px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 0 40px rgba(180,120,255,0.5);
  }
  .overlay-box h2 {
    font-family: 'Bungee', sans-serif;
    color: #ffd060;
    margin: 0 0 6px;
    letter-spacing: 4px;
  }
  .overlay-box .score-line {
    font-family: 'Russo One', sans-serif;
    font-size: 34px;
    color: #ffd060;
    margin: 6px 0;
    text-shadow: 0 0 16px rgba(255,200,80,0.5);
  }
  .overlay-box p { margin: 6px 0 16px; color: #d8c8f5; letter-spacing: 1px; font-size: 13px; }
  .overlay-box .btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<div id="game"></div>
<div class="title">CITY MARBLES · 3D</div>
<div class="hud">
  <div class="row">SCORE · <span class="v" id="score">0</span></div>
  <div class="row combo" id="comboRow">COMBO · <span class="v" id="combo">x1.0 (0)</span></div>
  <div class="row">LEVEL <span class="v" id="level">1</span> · <span class="v" id="progress">0%</span></div>
</div>
<div class="toast" id="toast">—</div>
<div class="hint">Tap red gaps · last-second repairs = bonus · grab gold gems · ride blue boosts</div>
<div class="controls">
  <button id="playBtn" class="primary">▶ RELEASE MARBLE</button>
  <button id="resetBtn">RESET</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="overTitle">—</h2>
    <div class="score-line" id="overScore">0</div>
    <p id="overBody">—</p>
    <div class="btns">
      <button id="overNext" class="primary">NEXT LEVEL</button>
      <button id="overClose">REPLAY</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040318);
scene.fog = new THREE.Fog(0x14082a, 40, 110);

const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 11, 34);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('game').appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- Lights ----------
scene.add(new THREE.HemisphereLight(0xc0a0ff, 0x201048, 0.45));
const sun = new THREE.DirectionalLight(0xffe0c0, 1.2);
sun.position.set(-15, 30, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -15;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 90;
scene.add(sun);
const neonA = new THREE.PointLight(0xff60c0, 0.9, 40);
neonA.position.set(-10, 14, 10);
scene.add(neonA);
const neonB = new THREE.PointLight(0x60c0ff, 0.9, 40);
neonB.position.set(10, 14, 10);
scene.add(neonB);

// ---------- Ground ----------
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(180, 60),
  new THREE.MeshStandardMaterial({ color: 0x0a0420, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const street = new THREE.Mesh(
  new THREE.PlaneGeometry(180, 4),
  new THREE.MeshStandardMaterial({ color: 0x141028, roughness: 0.9 })
);
street.rotation.x = -Math.PI / 2;
street.position.y = 0.02;
scene.add(street);

// ---------- Groups (swappable per level) ----------
const BUILDING_GROUP = new THREE.Group(); scene.add(BUILDING_GROUP);
const TRACK_GROUP    = new THREE.Group(); scene.add(TRACK_GROUP);
const GEM_GROUP      = new THREE.Group(); scene.add(GEM_GROUP);
const BOOST_GROUP    = new THREE.Group(); scene.add(BOOST_GROUP);
const FX_GROUP       = new THREE.Group(); scene.add(FX_GROUP);

// ---------- Materials ----------
const windowColors = [0xffd060, 0x80c8ff, 0xa0ffb0, 0xffa0d0];
const matGold     = new THREE.MeshStandardMaterial({ color: 0xffd060, emissive: 0x604010, emissiveIntensity: 0.3, metalness: 0.55, roughness: 0.28 });
const matGem      = new THREE.MeshStandardMaterial({ color: 0xffe070, emissive: 0xffa020, emissiveIntensity: 1.1, metalness: 0.7, roughness: 0.15 });
const matBoostTpl = new THREE.MeshStandardMaterial({ color: 0x60d0ff, emissive: 0x30a0ff, emissiveIntensity: 1.2, transparent: true, opacity: 0.85 });

function freshWarnMat() {
  return new THREE.MeshStandardMaterial({
    color: 0xff2040, emissive: 0xff2040, emissiveIntensity: 0.95,
    transparent: true, opacity: 0.55,
  });
}
function freshRepairMat() {
  return new THREE.MeshStandardMaterial({
    color: 0xffe890, emissive: 0xffb040, emissiveIntensity: 1.4,
    metalness: 0.55, roughness: 0.28,
  });
}

// ---------- Marble ----------
const marble = new THREE.Mesh(
  new THREE.SphereGeometry(0.34, 32, 32),
  new THREE.MeshStandardMaterial({
    color: 0xff4060, emissive: 0x701020, emissiveIntensity: 0.5,
    metalness: 0.85, roughness: 0.14,
  })
);
marble.castShadow = true;
scene.add(marble);
// Rim light that travels with the marble — creates a visible specular spot
const marbleLight = new THREE.PointLight(0xffd0a0, 0.9, 6);
scene.add(marbleLight);

// ---------- State ----------
let level = 1;
let score = 0;
let combo = 0;
let segments = [];
let path = [];
let totalLen = 0;
let gems = [];
let boosts = [];
let marbleDist = 0;
let marbleVel = 0;
let running = false;
let falling = false;
let finished = false;
let won = false;
let boostTimer = 0;
let shakeTimer = 0;
let cameraMode = 'intro';  // 'intro' | 'chase' | 'fall' | 'win'
let winTimer = 0;
let sparks = [];
let confetti = [];
let trail = [];

const BASE_SPEED  = 6.2;
const SPEED_RANGE = 5.0;    // downhill adds, uphill subtracts
const BOOST_SPEED = 13.5;
const EASE_RATE   = 2.6;    // velocity easing toward target (per sec)

// ---------- Builders ----------
function clearGroup(g) {
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    c.geometry?.dispose?.();
    if (c.material && c.material !== matGold && c.material !== matGem && c.material !== matBoostTpl) {
      c.material?.dispose?.();
    }
  }
}

function makeBuilding(b) {
  const bodyMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(0.7 + Math.random() * 0.15, 0.35, 0.22),
    roughness: 0.75,
  });
  const body = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), bodyMat);
  body.position.set(b.x, b.h / 2, 0);
  body.castShadow = true; body.receiveShadow = true;
  BUILDING_GROUP.add(body);
  const winRows = Math.max(2, Math.floor((b.h - 1) / 1.2));
  const winCols = Math.max(2, Math.floor((b.w - 0.8) / 1.0));
  for (let r = 0; r < winRows; r++) {
    for (let c = 0; c < winCols; c++) {
      if (Math.random() < 0.12) continue;
      const wCol = windowColors[Math.floor(Math.random() * windowColors.length)];
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(0.45, 0.55),
        new THREE.MeshStandardMaterial({
          color: 0x101028, emissive: wCol,
          emissiveIntensity: 0.7 + Math.random() * 0.3,
        })
      );
      const colSpacing = (b.w - 0.8) / winCols;
      const rowSpacing = (b.h - 1) / winRows;
      win.position.set(
        b.x - (b.w - 0.8) / 2 + colSpacing * (c + 0.5),
        0.6 + rowSpacing * (r + 0.5),
        b.d / 2 + 0.02,
      );
      BUILDING_GROUP.add(win);
    }
  }
}

function makeWarnFor(seg, i) {
  const midX = (seg.p1.x + seg.p2.x) / 2;
  const midY = (seg.p1.y + seg.p2.y) / 2;
  const warn = new THREE.Mesh(new THREE.BoxGeometry(seg.len * 1.15, 1.8, 3.0), freshWarnMat());
  warn.position.set(midX, midY + 0.9, 0);
  warn.rotation.z = seg.angle;
  warn.userData.segmentIndex = i;
  TRACK_GROUP.add(warn);
  return warn;
}

function buildLevel() {
  clearGroup(BUILDING_GROUP);
  clearGroup(TRACK_GROUP);
  clearGroup(GEM_GROUP);
  clearGroup(BOOST_GROUP);
  clearGroup(FX_GROUP);
  segments = []; path = []; gems = []; boosts = [];
  sparks = []; confetti = []; trail = [];

  const count = Math.min(12, 7 + Math.floor((level - 1) / 2));
  const spacing = 6.6;
  const startX = -(count - 1) * spacing * 0.5;
  let prevH = 6;
  const buildings = [];
  for (let i = 0; i < count; i++) {
    let h = 6 + Math.sin(i * 1.1 + level * 0.7) * 2.4 + (Math.random() - 0.5) * 1.8;
    h = Math.max(3.5, Math.min(11.5, h));
    if (Math.abs(h - prevH) > 4.2) h = prevH + Math.sign(h - prevH) * 4.2;
    prevH = h;
    const w = 3.4 + Math.random() * 1.4;
    buildings.push({ x: startX + i * spacing, w, d: 4, h });
  }
  buildings.forEach(makeBuilding);

  buildings.forEach((b) => {
    path.push({ x: b.x - b.w / 2 + 0.45, y: b.h });
    path.push({ x: b.x + b.w / 2 - 0.45, y: b.h });
  });

  for (let i = 0; i < path.length - 1; i++) {
    const p1 = path[i], p2 = path[i + 1];
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx);
    segments.push({
      p1, p2, len, angle,
      slope: Math.sin(angle),   // +uphill, -downhill
      broken: false, repaired: false,
      isRoof: (i % 2 === 0),
      mesh: null, warn: null, pulseT: 0,
    });
  }
  totalLen = segments.reduce((s, seg) => s + seg.len, 0);

  // Broken segments (never the first or last so marble gets a ramp-up and a finish line)
  const brokenCount = Math.min(segments.length - 2, 3 + level);
  const candidates = segments.map((_, i) => i).filter(i => i !== 0 && i !== segments.length - 1);
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  candidates.slice(0, brokenCount).forEach(i => segments[i].broken = true);

  segments.forEach((seg, i) => {
    const midX = (seg.p1.x + seg.p2.x) / 2;
    const midY = (seg.p1.y + seg.p2.y) / 2;
    const track = new THREE.Mesh(new THREE.BoxGeometry(seg.len, 0.28, 1.4), matGold);
    track.position.set(midX, midY - 0.14, 0);
    track.rotation.z = seg.angle;
    track.castShadow = true; track.receiveShadow = true;
    seg.mesh = track;
    if (!seg.broken) {
      TRACK_GROUP.add(track);
    } else {
      seg.warn = makeWarnFor(seg, i);
      seg.pulseT = Math.random() * Math.PI * 2;
    }
  });

  // Gems on intact segments (not first segment so you don't grab one at y=0)
  const intactIdx = segments.map((_, i) => i).filter(i => !segments[i].broken && i > 0);
  const gemCount = Math.min(intactIdx.length, 3 + level);
  for (let g = 0; g < gemCount; g++) {
    if (!intactIdx.length) break;
    const si = intactIdx.splice(Math.floor(Math.random() * intactIdx.length), 1)[0];
    const seg = segments[si];
    const localT = 0.3 + Math.random() * 0.4;
    const x = seg.p1.x + (seg.p2.x - seg.p1.x) * localT;
    const y = seg.p1.y + (seg.p2.y - seg.p1.y) * localT;
    const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.3, 0), matGem);
    gem.position.set(x, y + 0.95, 0);
    gem.castShadow = true;
    gem.userData.baseY = y + 0.95;
    GEM_GROUP.add(gem);
    gems.push({ mesh: gem, collected: false, bobT: Math.random() * Math.PI * 2 });
  }

  // Boost pads
  const boostCount = Math.min(intactIdx.length, 1 + Math.floor(level / 2));
  for (let b = 0; b < boostCount; b++) {
    if (!intactIdx.length) break;
    const si = intactIdx.splice(Math.floor(Math.random() * intactIdx.length), 1)[0];
    const seg = segments[si];
    const localT = 0.5;
    const x = seg.p1.x + (seg.p2.x - seg.p1.x) * localT;
    const y = seg.p1.y + (seg.p2.y - seg.p1.y) * localT;
    const boost = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.12, 1.2), matBoostTpl.clone());
    boost.position.set(x, y + 0.03, 0);
    boost.rotation.z = seg.angle;
    BOOST_GROUP.add(boost);
    boosts.push({ mesh: boost, used: false, pulseT: Math.random() * Math.PI * 2 });
  }

  // Finish flag
  const endP = path[path.length - 1];
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.8, 10),
    new THREE.MeshStandardMaterial({ color: 0x302040 }));
  pole.position.set(endP.x + 0.6, endP.y + 1.2, 0);
  pole.castShadow = true;
  TRACK_GROUP.add(pole);
  const flag = new THREE.Mesh(
    new THREE.PlaneGeometry(1.6, 0.9),
    new THREE.MeshBasicMaterial({ color: 0xffd060 })
  );
  flag.position.set(endP.x + 1.4, endP.y + 2.1, 0);
  flag.userData.isFlag = true;
  TRACK_GROUP.add(flag);
}

// ---------- Path helpers ----------
function distToLocation(dist) {
  let acc = 0;
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    if (dist <= acc + s.len || i === segments.length - 1) {
      const localT = Math.max(0, Math.min(1, (dist - acc) / s.len));
      const x = s.p1.x + (s.p2.x - s.p1.x) * localT;
      const y = s.p1.y + (s.p2.y - s.p1.y) * localT;
      return { segIdx: i, localT, x, y, slope: s.slope };
    }
    acc += s.len;
  }
  const last = segments[segments.length - 1];
  return { segIdx: segments.length - 1, localT: 1, x: last.p2.x, y: last.p2.y, slope: last.slope };
}

function segStartDist(i) {
  let acc = 0;
  for (let j = 0; j < i; j++) acc += segments[j].len;
  return acc;
}

function placeMarbleAtDist(dist) {
  const loc = distToLocation(dist);
  marble.position.set(loc.x, loc.y + 0.34, 0);
  return loc;
}

// ---------- HUD + toasts ----------
function updateHud() {
  document.getElementById('score').textContent = score;
  const mult = 1 + Math.min(combo, 10) * 0.2;
  document.getElementById('combo').textContent = `x${mult.toFixed(1)} (${combo})`;
  document.getElementById('level').textContent = level;
  const pct = totalLen > 0 ? Math.round((marbleDist / totalLen) * 100) : 0;
  document.getElementById('progress').textContent = `${pct}%`;
}

function toast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color || '#ffd060';
  t.classList.remove('on');
  void t.offsetWidth;
  t.classList.add('on');
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.classList.remove('on'), 1000);
}

function bumpCombo() {
  combo++;
  const row = document.getElementById('comboRow');
  row.classList.remove('hot');
  void row.offsetWidth;
  row.classList.add('hot');
  updateHud();
}
function resetCombo() { combo = 0; updateHud(); }
function addScore(n) { score += n; updateHud(); }
function comboMult() { return 1 + Math.min(combo, 10) * 0.2; }

// ---------- Particles ----------
function spawnSparkBurst(x, y, z, colorHex, count) {
  count = count || 14;
  for (let i = 0; i < count; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 6, 6),
      new THREE.MeshBasicMaterial({ color: colorHex, transparent: true })
    );
    p.position.set(x, y, z);
    FX_GROUP.add(p);
    sparks.push({
      mesh: p,
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 5,
      vz: (Math.random() - 0.5) * 4,
      life: 0.7 + Math.random() * 0.3,
      age: 0,
    });
  }
}

function spawnConfettiBurst(x, y, count) {
  count = count || 90;
  const colors = [0xffd060, 0xff60a0, 0x60c8ff, 0xa0ffb0, 0xff8040];
  for (let i = 0; i < count; i++) {
    const p = new THREE.Mesh(
      new THREE.PlaneGeometry(0.28, 0.14),
      new THREE.MeshBasicMaterial({ color: colors[i % colors.length], side: THREE.DoubleSide, transparent: true })
    );
    p.position.set(x + (Math.random() - 0.5) * 1.8, y + (Math.random() - 0.5) * 0.6, (Math.random() - 0.5) * 1.2);
    FX_GROUP.add(p);
    confetti.push({
      mesh: p,
      vx: (Math.random() - 0.5) * 6,
      vy: 5 + Math.random() * 7,
      vz: (Math.random() - 0.5) * 4,
      spin: (Math.random() - 0.5) * 10,
      life: 2.2 + Math.random() * 0.8,
      age: 0,
    });
  }
}

function spawnTrail(speedFrac) {
  if (trail.length > 70) return;
  const hue = 0.02 + Math.min(0.1, speedFrac * 0.1);
  const color = new THREE.Color().setHSL(hue, 1.0, 0.55);
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.13 + speedFrac * 0.09, 6, 6),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85 })
  );
  p.position.set(marble.position.x - 0.18, marble.position.y - 0.1, 0);
  FX_GROUP.add(p);
  trail.push({
    mesh: p,
    life: 0.4 + speedFrac * 0.3,
    age: 0,
    vy: 0.3 + Math.random() * 0.4,
  });
}

// ---------- Raycast click → repair ----------
const raycaster = new THREE.Raycaster();
const mouseVec = new THREE.Vector2();
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (falling || finished) return;
  mouseVec.x = (e.clientX / innerWidth) * 2 - 1;
  mouseVec.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouseVec, camera);
  const warns = segments.filter(s => s.broken && !s.repaired && s.warn).map(s => s.warn);
  const hits = raycaster.intersectObjects(warns);
  if (hits.length > 0) repairSegment(hits[0].object.userData.segmentIndex);
});

function repairSegment(i) {
  const seg = segments[i];
  if (!seg.broken || seg.repaired) return;
  seg.repaired = true;
  TRACK_GROUP.remove(seg.warn);
  seg.warn = null;
  // Hot-glow repaired material that fades back to gold over ~1.2s.
  const hotMat = freshRepairMat();
  seg.mesh.material = hotMat;
  const t0 = performance.now();
  (function fade() {
    const t = (performance.now() - t0) / 1200;
    if (t >= 1) { seg.mesh.material = matGold; hotMat.dispose(); return; }
    hotMat.emissiveIntensity = 1.4 + (0.3 - 1.4) * t;
    hotMat.color.setRGB(1, 0.91 - 0.3 * t, 0.56 - 0.2 * t);
    requestAnimationFrame(fade);
  })();
  TRACK_GROUP.add(seg.mesh);
  // Bounce scale.
  const pulseStart = performance.now();
  (function pulse() {
    const t = (performance.now() - pulseStart) / 280;
    if (t >= 1) { seg.mesh.scale.set(1, 1, 1); return; }
    const s = 1 + 0.5 * Math.sin(Math.PI * t);
    seg.mesh.scale.set(1, s, s);
    requestAnimationFrame(pulse);
  })();
  // Sparkle burst.
  const midX = (seg.p1.x + seg.p2.x) / 2;
  const midY = (seg.p1.y + seg.p2.y) / 2;
  spawnSparkBurst(midX, midY + 0.5, 0, 0xffd060, 18);

  // Timing bonus: distance from marble to segment's start along the path.
  const distToSeg = segStartDist(i) - marbleDist;
  if (distToSeg < 0) {
    // Repaired after the marble already passed (probably mid-fall edge case) — no score.
    return;
  }
  let base = 25, bonus = 0, label = '';
  if (distToSeg < seg.len * 1.2) {
    bonus = 100; label = 'LAST SECOND!';
  } else if (distToSeg < seg.len * 2.8) {
    bonus = 40; label = 'CLUTCH!';
  } else {
    bonus = 0; label = 'FIXED';
  }
  bumpCombo();
  const gain = Math.round((base + bonus) * comboMult());
  addScore(gain);
  const mTag = combo >= 3 ? ` ×${comboMult().toFixed(1)}` : '';
  toast(`${label} +${gain}${mTag}`, bonus >= 100 ? '#ffe070' : '#ffd060');
}

// ---------- Camera ----------
function updateCamera(rawDt) {
  if (cameraMode === 'intro') {
    const targetX = marble.position.x - 6;
    const targetY = marble.position.y + 5;
    const targetZ = 16;
    camera.position.x += (targetX - camera.position.x) * Math.min(1, rawDt * 3);
    camera.position.y += (targetY - camera.position.y) * Math.min(1, rawDt * 3);
    camera.position.z += (targetZ - camera.position.z) * Math.min(1, rawDt * 3);
    camera.lookAt(marble.position.x + 4, marble.position.y, 0);
  } else if (cameraMode === 'chase') {
    const aheadLerp = 0.35;
    const leadX = marbleVel > 0 ? 0.4 : 0;
    const targetX = marble.position.x - 5.5 + leadX;
    const targetY = marble.position.y + 4.2;
    const targetZ = 12.5;
    camera.position.x += (targetX - camera.position.x) * Math.min(1, rawDt * 4.5);
    camera.position.y += (targetY - camera.position.y) * Math.min(1, rawDt * 4.5);
    camera.position.z += (targetZ - camera.position.z) * Math.min(1, rawDt * 4.5);
    const lookX = marble.position.x + 4.5;
    const lookY = marble.position.y - 0.2;
    camera.lookAt(lookX, lookY, 0);
    void aheadLerp;
  } else if (cameraMode === 'fall') {
    const targetX = marble.position.x - 1.3;
    const targetY = marble.position.y + 1.2;
    const targetZ = 4.5;
    camera.position.x += (targetX - camera.position.x) * Math.min(1, rawDt * 5);
    camera.position.y += (targetY - camera.position.y) * Math.min(1, rawDt * 5);
    camera.position.z += (targetZ - camera.position.z) * Math.min(1, rawDt * 5);
    camera.lookAt(marble.position);
  } else if (cameraMode === 'win') {
    winTimer += rawDt;
    const a = winTimer * 0.8;
    const r = 5.5;
    camera.position.set(
      marble.position.x + Math.cos(a) * r,
      marble.position.y + 3.2 + Math.sin(a * 0.5),
      Math.sin(a) * r + 5,
    );
    camera.lookAt(marble.position);
  }
  if (shakeTimer > 0) {
    shakeTimer -= rawDt;
    const s = Math.max(0, shakeTimer) * 0.55;
    camera.position.x += (Math.random() - 0.5) * s;
    camera.position.y += (Math.random() - 0.5) * s;
  }
}

// ---------- Main loop ----------
let lastTime = performance.now();
let timeScale = 1;

function animate(now) {
  const rawDt = Math.min(0.05, (now - lastTime) / 1000);
  const dt = rawDt * timeScale;
  lastTime = now;

  // Warning pulse (each warn has its own material now)
  for (const s of segments) {
    if (s.broken && !s.repaired && s.warn) {
      s.pulseT += dt * 4;
      s.warn.material.opacity = 0.35 + Math.sin(s.pulseT) * 0.3;
      s.warn.scale.y = 1 + Math.sin(s.pulseT * 1.5) * 0.15;
    }
  }
  // Gem bob + spin
  for (const g of gems) {
    if (!g.collected) {
      g.bobT += dt * 3;
      g.mesh.position.y = g.mesh.userData.baseY + Math.sin(g.bobT) * 0.15;
      g.mesh.rotation.y += dt * 1.8;
      g.mesh.rotation.x += dt * 0.9;
    }
  }
  // Boost pulse
  for (const b of boosts) {
    if (!b.used) {
      b.pulseT += dt * 6;
      b.mesh.material.opacity = 0.6 + Math.sin(b.pulseT) * 0.35;
    }
  }

  // Marble — rolling on track
  if (running && !finished && !falling) {
    const loc = distToLocation(marbleDist);
    const targetV = boostTimer > 0 ? BOOST_SPEED : (BASE_SPEED - loc.slope * SPEED_RANGE);
    marbleVel += (targetV - marbleVel) * Math.min(1, dt * EASE_RATE);
    marbleVel = Math.max(1.2, Math.min(BOOST_SPEED + 2, marbleVel));
    marbleDist += marbleVel * dt;
    boostTimer = Math.max(0, boostTimer - dt);

    const loc2 = placeMarbleAtDist(marbleDist);
    marble.rotation.z -= dt * marbleVel * 0.9;

    // Speed-reactive emissive
    const speedFrac = Math.max(0, Math.min(1, (marbleVel - 3) / 10));
    marble.material.emissiveIntensity = 0.5 + speedFrac * 0.8;
    marbleLight.intensity = 0.9 + speedFrac * 0.6;
    // Spawn trail particles
    if (Math.random() < 0.25 + speedFrac * 0.75) spawnTrail(speedFrac);

    // Gems
    for (const g of gems) {
      if (g.collected) continue;
      const dx = marble.position.x - g.mesh.position.x;
      const dy = marble.position.y - g.mesh.position.y;
      if (dx * dx + dy * dy < 0.95) {
        g.collected = true;
        GEM_GROUP.remove(g.mesh);
        spawnSparkBurst(g.mesh.position.x, g.mesh.position.y, 0, 0xffe080, 12);
        bumpCombo();
        const gain = Math.round(15 * comboMult());
        addScore(gain);
        toast(`GEM +${gain}`, '#ffe080');
      }
    }
    // Boost pads
    for (const b of boosts) {
      if (b.used) continue;
      const dx = marble.position.x - b.mesh.position.x;
      const dy = marble.position.y - b.mesh.position.y;
      if (dx * dx + dy * dy < 0.75) {
        b.used = true;
        BOOST_GROUP.remove(b.mesh);
        spawnSparkBurst(b.mesh.position.x, b.mesh.position.y + 0.2, 0, 0x60c8ff, 22);
        boostTimer = 1.3;
        marbleVel = Math.max(marbleVel, BOOST_SPEED);
        toast('BOOST!', '#60c8ff');
      }
    }

    if (marbleDist >= totalLen) {
      marbleDist = totalLen;
      placeMarbleAtDist(marbleDist);
      winFinish();
    } else {
      const seg = segments[loc2.segIdx];
      if (seg.broken && !seg.repaired) {
        falling = true;
        cameraMode = 'fall';
        timeScale = 0.35;
        shakeTimer = 0.5;
        document.getElementById('game').classList.remove('shake');
        void document.getElementById('game').offsetWidth;
        document.getElementById('game').classList.add('shake');
        setTimeout(() => document.getElementById('game').classList.remove('shake'), 500);
        toast('FELL', '#ff4060');
        resetCombo();
      }
    }
  } else if (running && falling) {
    marble.position.y -= dt * 14;
    marble.rotation.x += dt * 4;
    marble.rotation.z += dt * 2.5;
    if (marble.position.y < -2) {
      timeScale = 1;
      failFinish();
    }
  }

  // Update marble light position
  marbleLight.position.set(marble.position.x, marble.position.y + 0.8, 1);

  // Particles advance (use real time so FX don't feel glacial in slow-mo)
  const fxDt = rawDt;
  for (let i = sparks.length - 1; i >= 0; i--) {
    const p = sparks[i]; p.age += fxDt;
    p.mesh.position.x += p.vx * fxDt;
    p.mesh.position.y += p.vy * fxDt;
    p.mesh.position.z += p.vz * fxDt;
    p.vy -= 10 * fxDt;
    p.mesh.material.opacity = Math.max(0, 1 - p.age / p.life);
    if (p.age >= p.life) { FX_GROUP.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); sparks.splice(i, 1); }
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const p = confetti[i]; p.age += fxDt;
    p.mesh.position.x += p.vx * fxDt;
    p.mesh.position.y += p.vy * fxDt;
    p.mesh.position.z += p.vz * fxDt;
    p.vy -= 6 * fxDt;
    p.mesh.rotation.z += p.spin * fxDt;
    p.mesh.rotation.x += p.spin * 0.5 * fxDt;
    p.mesh.material.opacity = Math.max(0, 1 - p.age / p.life);
    if (p.age >= p.life) { FX_GROUP.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); confetti.splice(i, 1); }
  }
  for (let i = trail.length - 1; i >= 0; i--) {
    const p = trail[i]; p.age += fxDt;
    p.mesh.position.y += p.vy * fxDt;
    const f = 1 - p.age / p.life;
    p.mesh.material.opacity = 0.85 * f;
    p.mesh.scale.setScalar(0.6 + f);
    if (p.age >= p.life) { FX_GROUP.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); trail.splice(i, 1); }
  }

  updateCamera(rawDt);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ---------- Win / Fail ----------
function winFinish() {
  finished = true;
  running = false;
  won = true;
  cameraMode = 'win';
  winTimer = 0;
  const loc = distToLocation(totalLen);
  spawnConfettiBurst(loc.x, loc.y + 2, 120);
  const reachBonus = 200 + combo * 20;
  addScore(reachBonus);
  toast(`MADE IT! +${reachBonus}`, '#ffd060');
  setTimeout(() => {
    document.getElementById('overTitle').textContent = `LEVEL ${level} CLEAR`;
    document.getElementById('overScore').textContent = score;
    const gemsCollected = gems.filter(g => g.collected).length;
    const fixed = segments.filter(s => s.broken && s.repaired).length;
    const totalBroken = segments.filter(s => s.broken).length;
    document.getElementById('overBody').textContent =
      `Fixed ${fixed}/${totalBroken} · Gems ${gemsCollected}/${gems.length}`;
    document.getElementById('overNext').style.display = '';
    document.getElementById('overClose').textContent = 'REPLAY';
    document.getElementById('overlay').classList.add('on');
  }, 1800);
}

function failFinish() {
  finished = true;
  running = false;
  won = false;
  document.getElementById('overTitle').textContent = 'MARBLE FELL';
  document.getElementById('overScore').textContent = score;
  const atT = Math.round((marbleDist / totalLen) * 100);
  document.getElementById('overBody').textContent =
    `Dropped at ${atT}%. Time your taps for the LAST SECOND! bonus.`;
  document.getElementById('overNext').style.display = 'none';
  document.getElementById('overClose').textContent = 'RETRY';
  document.getElementById('overlay').classList.add('on');
}

// ---------- Controls ----------
function play() {
  if (running) return;
  if (finished) {
    // Retry current level (NEXT LEVEL button handles advancement)
    resetLevel();
  }
  running = true;
  cameraMode = 'chase';
  document.getElementById('playBtn').disabled = true;
}

function resetLevel() {
  buildLevel();
  marbleDist = 0;
  marbleVel = BASE_SPEED * 0.3;
  boostTimer = 0;
  falling = false;
  finished = false;
  won = false;
  running = false;
  timeScale = 1;
  cameraMode = 'intro';
  placeMarbleAtDist(0);
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('playBtn').disabled = false;
  document.getElementById('playBtn').textContent = '▶ RELEASE MARBLE';
  updateHud();
}

function nextLevel() {
  level++;
  resetLevel();
}

function fullReset() {
  level = 1;
  score = 0;
  combo = 0;
  resetLevel();
}

document.getElementById('playBtn').addEventListener('click', play);
document.getElementById('resetBtn').addEventListener('click', fullReset);
document.getElementById('overClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('on');
  resetLevel();
  setTimeout(play, 200);
});
document.getElementById('overNext').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('on');
  nextLevel();
  setTimeout(play, 200);
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); play(); }
  if (e.key === 'r' || e.key === 'R') fullReset();
});

// ---------- Init ----------
buildLevel();
placeMarbleAtDist(0);
marbleVel = BASE_SPEED * 0.3;
updateHud();
</script>
</body>
